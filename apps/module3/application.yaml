apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module3
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jerzyoleksa/bootroot.git   # ← ZMIEŃ NA SWÓJ REPO
    targetRevision: main
    path: apps/module3
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true