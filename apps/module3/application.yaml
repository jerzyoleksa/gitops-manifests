apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: module3
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/jerzyoleksa/gitops-manifests.git
    targetRevision: main
    path: apps/module3

  destination:
    server: https://kubernetes.default.svc
    namespace: module3

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true